# Audoctl Configuration File
# This is a production-ready configuration with sensible defaults

# Database configuration
database:
  driver: sqlite        # Options: postgres, mysql, sqlite
  host: localhost
  port: 5432
  user: audoctl
  password: ""
  name: audoctl
  ssl_mode: disable
  dsn: "audoctl.db"     # For SQLite

# Application metadata
application:
  name: Audoctl
  version: 1.0.0

# Logging configuration
log:
  level: info           # Options: debug, info, warn, error
  env: production       # Options: development, production

# HTTP Server configuration
http_server:
  host: 0.0.0.0
  port: 8080

  # Timeouts
  read_timeout: 10s
  write_timeout: 10s
  idle_timeout: 120s

  # Body limits (10MB default)
  body_limit: 10485760
  max_header_bytes: 8192

  # Buffer sizes
  read_buffer_size: 8192
  write_buffer_size: 8192

  # Performance
  prefork: false
  concurrency: 262144
  reduce_memory_usage: false
  disable_keepalive: false
  stream_request_body: false
  disable_preparse_multipart: true

  # Compression
  enable_compression: true
  compress_level: 1

  # Security
  enable_request_id: true
  request_id_header: X-Request-ID
  trusted_proxies: ""
  proxy_header: X-Forwarded-For
  enable_ip_validation: false

  # Rate limiting
  enable_rate_limit: false
  rate_limit_max: 100
  rate_limit_duration: 1m

  # Graceful shutdown
  shutdown_timeout: 30s

  # Development/Debug
  disable_startup_message: false
  enable_print_routes: false
  enable_stack_trace: false

  # Observability
  enable_metrics: false
  metrics_path: /metrics
  enable_health_check: true
  health_check_path: /health
  enable_pprof: false

# CORS configuration
cors:
  enabled: true
  allow_origins: "*"
  allow_methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
  allow_headers: Origin,Content-Type,Accept,Authorization,X-Request-ID,X-Trace-ID
  allow_credentials: false
  expose_headers: X-Request-ID,X-Trace-ID
  max_age: 3600

# TLS configuration (optional)
tls:
  enabled: false
  cert_file: ""
  key_file: ""
  min_version: "1.2"

# Security headers
security:
  enable_security_headers: true
  xss_protection: "1; mode=block"
  content_type_nosniff: nosniff
  x_frame_options: SAMEORIGIN
  hsts_max_age: 31536000
  hsts_include_subdomains: true
  content_security_policy: "default-src 'self'"
  referrer_policy: strict-origin-when-cross-origin
  
  # API Key authentication (optional)
  enable_api_key_auth: false
  api_key_header: X-API-Key
